<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>34th-birthday-gift</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            
            /* 浪漫花園窗紗背景 */
            background-image: url('photo_2026-06-20_16-00-15.jpg');
            background-size: cover;       
            background-position: center;   
            background-repeat: no-repeat;  
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 提供 3D 水平翻轉的立體透視感 */
        }

        /* 互動舞台區 */
        .stage-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= 禮物盒結構 ================= */
        .gift-wrapper {
            position: absolute; 
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 280px;  
            height: 280px;
            z-index: 5;
            transform-origin: center center;
        }

        .gift-box {
            position: absolute;
            width: 100%; /* 強制 Group2 與 Group3 百分之百填滿容器，達到絕對同寬 */
            height: 100%;
            object-fit: contain; 
            top: 0;
            left: 0;
        }

        #giftOpen {
            opacity: 0; /* 初始狀態隱藏開蓋版 */
        }

        /* ================= 圖4：貓咪蛋糕 ================= */
        .gift-surprise {
            position: absolute;
            width: 200px;
            height: 200px;
            object-fit: contain;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 15; /* 確保蓋在禮物盒之上 */
            opacity: 0;
            display: none; 
            transform-origin: center center;
        }

        /* ================= 圖1：小人 (.png) ================= */
        .character {
            position: absolute;
            width: 120px;  
            height: 120px;
            background-image: url('image 1140.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            bottom: calc(50% - 90px); 
            right: -150px; 
            z-index: 10; 
            display: none;
        }

        /* ================= 餐券卡片滑動容器 (Swiper) ================= */
        .card-ticket-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.25); 
            width: 280px;  
            height: 448px; 
            opacity: 0;
            z-index: 20; /* 大卡片基本層級 */
            display: none;
            transform-origin: center center;
        }

        /* Swiper 內部基本設定 */
        .swiper {
            width: 100%;
            height: 100%;
        }
        .swiper-slide {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 實際圖片本體 */
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* 全螢幕激活樣式 */
        .card-ticket-container.fullscreen {
            display: block !important; 
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            transform: translate(-50%, -50%) scale(1) !important; 
            z-index: 20; /* 保持在 20，確保讓出上層給分頁球與提示字 */
        }

        /* 全螢幕下圖片的高度優化與上移微調 */
        .card-ticket-container.fullscreen .swiper-slide img {
            width: 100% !important;
            height: 72% !important; 
            object-fit: contain !important; 
            margin-top: -8%; 
        }

        /* 自訂分頁小圓點（提升 z-index 確保浮在卡片上方） */
        .swiper-pagination-bullet {
            background: #ffffff !important;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        .swiper-pagination-bullet-active {
            background: #8ed2ff !important; /* 啟動時變成與按鈕呼應的天空藍 */
            opacity: 1;
            width: 16px !important; /* 拉長成精緻的膠囊狀 */
            border-radius: 5px !important;
        }
        .swiper-pagination {
            bottom: 23% !important; /* 控制分頁小圓點位置，剛好在提示字上方 */
            z-index: 999 !important; /* 關鍵：強制浮在全螢幕卡片之上 */
        }

        /* 提示文字（提升 z-index 確保浮在卡片上方） */
        .save-tip {
            position: absolute;
            bottom: 16%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px; 
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(70, 100, 150, 0.6), 0 0 15px rgba(255, 255, 255, 0.5);
            opacity: 0; 
            display: none;
            pointer-events: none;
            z-index: 999; /* 關鍵：強制浮在全螢幕卡片之上 */
            white-space: nowrap;
        }

        /* ================= 按鈕常駐頂層控制區 ================= */
        .ui-overlay-container {
            position: absolute;
            bottom: 6%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999; /* 最高層級，按鈕永遠在最上面 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 磨砂質感「天空藍」按鈕 */
        .btn {
            padding: 13px 44px;
            font-size: 16px;
            background: linear-gradient(135deg, rgba(142, 210, 255, 0.8), rgba(114, 162, 255, 0.8)); 
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(6px); 
            box-shadow: 0 8px 25px rgba(114, 162, 255, 0.25);
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 1px 4px rgba(50, 80, 130, 0.3);
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(115, 195, 255, 0.95), rgba(85, 140, 255, 0.95));
            box-shadow: 0 10px 30px rgba(85, 140, 255, 0.45);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: linear-gradient(135deg, rgba(210, 215, 225, 0.6), rgba(180, 185, 195, 0.6)) !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="stage-container" id="stageContainer">
        <div class="gift-wrapper" id="giftWrapper">
            <img src="Group2.png" class="gift-box" id="giftClose" alt="禮物盒">
            <img src="Group3.png" class="gift-box" id="giftOpen" alt="禮物盒開蓋">
        </div>

        <img src="Group4.png" class="gift-surprise" id="giftSurprise" alt="貓咪蛋糕">
        
        <div class="card-ticket-container swiper" id="ticketContainer">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="Group 1597880818.png" alt="驚喜 1">
                </div>
                <div class="swiper-slide">
                    <img src="Group 1597880819.png" alt="驚喜 2">
                </div>
                <div class="swiper-slide">
                    <img src="Group 1597880820.png" alt="驚喜 3">
                </div>
                <div class="swiper-slide">
                    <img src="Group 1597880821.png" alt="驚喜 4">
                </div>
                <div class="swiper-slide">
                    <img src="Group 1597880822.png" alt="驚喜 5">
                </div>
                <div class="swiper-slide">
                    <img src="Group 1597880823.png" alt="驚喜 6">
                </div>
            </div>
            
            <div class="swiper-pagination"></div>
        </div>
        
        <div class="save-tip" id="saveTip">左右滑動，長按保存！</div>
        
        <div class="character" id="character"></div>

        <div class="ui-overlay-container">
            <button class="btn" id="startBtn"> 點擊開啟 </button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const character = document.getElementById('character');
        const giftWrapper = document.getElementById('giftWrapper');
        const giftClose = document.getElementById('giftClose');
        const giftOpen = document.getElementById('giftOpen');
        const giftSurprise = document.getElementById('giftSurprise');
        const ticketContainer = document.getElementById('ticketContainer');
        const saveTip = document.getElementById('saveTip');

        // 初始化 Swiper 輪播組件
        let ticketSwiper = new Swiper('#ticketContainer', {
            loop: false,             
            speed: 400,              
            spaceBetween: 20,        
            effect: 'slide',         
            pagination: {
                el: '.swiper-pagination',
                clickable: true,     
            },
        });

        startBtn.addEventListener('click', () => {
            // 1. 鎖定按鈕避免連點
            startBtn.disabled = true;
            
            // 2. 重置所有組件與動畫狀態
            saveTip.style.display = 'none';
            saveTip.style.opacity = '0';
            ticketContainer.classList.remove('fullscreen');
            
            // 每次重播都強制回到第一張卡片
            if(ticketSwiper) ticketSwiper.slideTo(0, 0);
            
            gsap.set(character, { display: 'block', x: 0, y: 0, scale: 1, opacity: 1, scaleX: 1 });
            gsap.set(giftWrapper, { display: 'block', opacity: 1, scale: 1, y: 0 });
            gsap.set(giftClose, { opacity: 1 });
            gsap.set(giftOpen, { opacity: 0 });
            gsap.set(giftSurprise, { display: 'none', scale: 0, y: 0, rotationY: 0, opacity: 0 });
            gsap.set(ticketContainer, { display: 'none', opacity: 0, scale: 0.25, rotation: 0 });

            const stageWidth = window.innerWidth;
            const targetX = -(stageWidth / 2 + 60); 

            const tl = gsap.timeline();

            // --- 第一階段：小人折返跑與跳入 ---
            tl.to(character, { x: -stageWidth - 200, duration: 2.0, ease: "power1.inOut" })
              .to(character, { scaleX: -1, duration: 0.1 })
              .to(character, { x: -stageWidth * 0.3, duration: 1.2, ease: "power1.inOut" })
              .to(character, { scaleX: 1, duration: 0.1 })
              .to(character, { x: targetX, duration: 0.9, ease: "power1.out" })
            
            // 原地興奮跳動
              .to(character, { y: -70, duration: 0.16, ease: "power1.out" })
              .to(character, { y: 0, duration: 0.16, ease: "power1.in" })
              .to(character, { y: -70, duration: 0.16, ease: "power1.out" })
              .to(character, { y: 0, duration: 0.16, ease: "power1.in" })
            
            // 跳進 Group2 盒子中
              .to(character, { y: -160, x: targetX - 40, scale: 0.5, duration: 0.35, ease: "power1.out" })
              .to(character, { y: -10, opacity: 0, duration: 0.25, ease: "power1.in" })
              // 盒子微震動
              .to(giftWrapper, { scale: 1.05, yoyo: true, repeat: 1, duration: 0.08 }, "-=0.2")
            
            // --- 第二階段：盒子同寬無縫變身 (Group2 ➡️ Group3) ---
              .to(giftClose, { opacity: 0, duration: 0.5, ease: "power1.inOut" }, "+=0.1")
              .to(giftOpen, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, "-=0.5")
            
            // --- 第三階段：Group4 (貓咪蛋糕) 向上彈出並旋轉 ---
              .call(() => {
                  gsap.set(giftSurprise, { display: 'block', opacity: 1 });
              })
              // 往上衝出並放大
              .to(giftSurprise, { y: -220, scale: 1.2, duration: 0.5, ease: "back.out(1.5)" })
              
              // 在空中進行水平 3D 旋轉 360 度
              .to(giftSurprise, { rotationY: 360, duration: 1.0, ease: "power2.inOut" })
            
            // --- 第四階段：大餐券卡片登場 ---
              .to([giftWrapper, giftSurprise], { opacity: 0, duration: 0.05 })
              .call(() => {
                  ticketContainer.style.display = 'block'; 
                  ticketSwiper.update(); 
              })
              
              // 卡片自中心彈出放大
              .to(ticketContainer, {
                  opacity: 1,
                  scale: 1,
                  duration: 0.7, 
                  ease: "power4.out",
                  onComplete: () => {
                      ticketContainer.classList.add('fullscreen');
                      ticketSwiper.update(); // 展開至全螢幕後再次校準
                  }
              })
            
            // --- 第五階段：完成動畫，展現提示字與重置按鈕 ---
              .call(() => {
                  saveTip.style.display = 'block';
                  startBtn.innerHTML = " 再看一次 ";
              })
              .to(saveTip, { opacity: 1, duration: 0.4 })
              .call(() => {
                  startBtn.disabled = false;
              });
        });
    </script>
</body>
</html>
